<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance</title>

<style>
  body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
  }

  .container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
  }

  select {
    padding: 8px;
    margin: 10px 5px;
  }

  .section-title {
    background: #e9ecef;
    padding: 5px;
    font-weight: bold;
    margin-top: 15px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    padding: 5px;
    border-bottom: 1px solid #ddd;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
  }

</style>
</head>

<body>

<div class="container">

<h2>📊 Attendance</h2>

<!-- ✅ CLASS -->
<select id="class">
  <option>Loading...</option>
</select>

<!-- ✅ SECTION -->
<select id="section">
  <option>Select Class First</option>
</select>

<!-- ✅ ADVISER -->
<p><b>Adviser:</b> <span id="adviser"></span></p>

<!-- ✅ STUDENTS -->
<div id="students"></div>

<button onclick="saveAttendance()">💾 Save Attendance</button>

<p id="msg"></p>

</div>

<script>

// =======================
// ✅ STORAGE
// =======================
let classes = [];
let sections = [];
let students = [];


// =======================
// ✅ LOAD CLASSES
// =======================
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkaem468jROXCpu4pfmlzfsRY5tpznOAmP-00X1ObYMNxcP6nWGrGUNFjK-OAZwuRlet72oVMWjZB/pub?gid=1776947729&single=true&output=csv")
.then(res => res.text())
.then(data => {

  let rows = data.split("\n").slice(1);
  let classSelect = document.getElementById("class");

  classSelect.innerHTML = '<option>Select Class</option>';

  rows.forEach(row => {
    let c = row.replace("\r","").trim();
    if (c) {
      let opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      classSelect.appendChild(opt);
    }
  });

});


// =======================
// ✅ LOAD SECTIONS
// =======================
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkaem468jROXCpu4pfmlzfsRY5tpznOAmP-00X1ObYMNxcP6nWGrGUNFjK-OAZwuRlet72oVMWjZB/pub?gid=1804340378&single=true&output=csv")
.then(res => res.text())
.then(data => {

  let rows = data.split("\n").slice(1);

  rows.forEach(row => {
    let cols = row.split(",");

    if (cols.length >= 3) {
      sections.push({
        class: cols[0].trim(),
        section: cols[1].trim(),
        adviser: cols[2].trim()
      });
    }
  });

});


// =======================
// ✅ LOAD STUDENTS
// =======================
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkaem468jROXCpu4pfmlzfsRY5tpznOAmP-00X1ObYMNxcP6nWGrGUNFjK-OAZwuRlet72oVMWjZB/pub?gid=0&single=true&output=csv")
.then(res => res.text())
.then(data => {

  let rows = data.split("\n").slice(1);

  rows.forEach(row => {
    let cols = row.split(",");

    if (cols.length >= 5) {
      students.push({
        class: cols[0].trim(),
        section: cols[1].trim(),
        lrn: cols[2].trim(),
        name: cols[3].trim(),
        gender: cols[4].trim()
      });
    }
  });

});


// =======================
// ✅ FILTER SECTION
// =======================
document.getElementById("class").addEventListener("change", function() {

  let selectedClass = this.value;
  let sectionSelect = document.getElementById("section");

  sectionSelect.innerHTML = '<option>Select Section</option>';

  sections.forEach(s => {
    if (s.class === selectedClass) {
      let opt = document.createElement("option");
      opt.value = s.section;
      opt.textContent = s.section;
      sectionSelect.appendChild(opt);
    }
  });

});


// =======================
// ✅ DISPLAY STUDENTS + ADVISER
// =======================
document.getElementById("section").addEventListener("change", function() {

  let selectedClass = document.getElementById("class").value;
  let selectedSection = this.value;

  let container = document.getElementById("students");
  container.innerHTML = "";

  // ✅ SET ADVISER
  let found = sections.find(s =>
    s.class === selectedClass && s.section === selectedSection
  );

  document.getElementById("adviser").innerText = found ? found.adviser : "";

  // ✅ MALE / FEMALE
  let maleHTML = `<div class="section-title">👨 Male</div>`;
  let femaleHTML = `<div class="section-title">👩 Female</div>`;

  let index = 0;

  students.forEach(s => {

    if (s.class === selectedClass && s.section === selectedSection) {

      let row = `
      <div class="row">
        <span>${s.name}</span>
        <span>
          <input type="radio" name="s${index}" value="P" checked> P
          <input type="radio" name="s${index}" value="A"> A
          <input type="radio" name="s${index}" value="L"> L
        </span>
      </div>`;

      if (s.gender === "Male") {
        maleHTML += row;
      } else {
        femaleHTML += row;
      }

      index++;
    }

  });

  container.innerHTML = maleHTML + femaleHTML;

});


// =======================
// ✅ SAVE ATTENDANCE
// =======================
function saveAttendance() {

  let selectedClass = document.getElementById("class").value;
  let selectedSection = document.getElementById("section").value;

  let rows = document.querySelectorAll(".row");

  let records = [];

  rows.forEach((row, i) => {

    let name = row.children[0].innerText;
    let selected = document.querySelector(`input[name="s${i}"]:checked`);

    records.push({
      class: selectedClass,
      section: selectedSection,
      name: name,
      status: selected.value
    });

  });

  // ✅ SEND TO GOOGLE SHEETS
  fetch("https://script.google.com/macros/s/AKfycbxf41h2kdkb4DIqW4iCmqtjxr58pllfyZza_9n2zU7I0ndPyUADGa5QD_MKNTUblXg6/exec
", {
    method: "POST",
    body: JSON.stringify(records)
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("msg").innerText = "✅ Attendance Saved!";
  })
  .catch(err => {
    alert("❌ Error saving");
  });

}

</script>

</body>
</html>
