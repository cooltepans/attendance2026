<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Student</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #007BFF, #00c6ff);
}

.container {
  max-width: 500px;
  margin: 50px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

select, input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 10px;
  background: #007BFF;
  color: white;
  border: none;
}

button:hover {
  background: #0056b3;
}
</style>
</head>

<body>

<div class="container">

<h2>Add Student</h2>

<select id="class">
  <option>Loading classes...</option>
</select>

<select id="section">
  <option>Select class first</option>
</select>

<input type="text" id="adviser" placeholder="Adviser" readonly>

<input type="number" id="lrn" placeholder="LRN">
<input type="text" id="name" placeholder="Name">

<select id="gender">
  <option value="">Gender</option>
  <option>Male</option>
  <option>Female</option>
</select>

<button onclick="save()">Save</button>

<p id="msg"></p>

</div>

<script>

// ✅ STORAGE
let sections = [];


// ✅ STEP 1: LOAD SECTIONS FIRST
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkaem468jROXCpu4pfmlzfsRY5tpznOAmP-00X1ObYMNxcP6nWGrGUNFjK-OAZwuRlet72oVMWjZB/pub?gid=1804340378&single=true&output=csv")
.then(res => res.text())
.then(data => {

  console.log("SECTION DATA:", data);

  let rows = data.split("\n").slice(1);

  rows.forEach(row => {
    let cols = row.split(",");
    if (cols.length >= 3) {
      sections.push({
        class: cols[0].trim(),
        section: cols[1].trim(),
        adviser: cols[2].trim()
      });
    }
  });

  loadClasses(); // ✅ AFTER sections, load classes

});


// ✅ STEP 2: LOAD CLASSES
function loadClasses() {

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkaem468jROXCpu4pfmlzfsRY5tpznOAmP-00X1ObYMNxcP6nWGrGUNFjK-OAZwuRlet72oVMWjZB/pub?gid=1776947729&single=true&output=csv")
.then(res => res.text())
.then(data => {

  console.log("CLASS DATA:", data);

  let rows = data.split("\n").slice(1);
  let select = document.getElementById("class");

  select.innerHTML = '<option>Select Class</option>';

  rows.forEach(row => {
    let val = row.replace("\r","").trim();

    if (val) {
      let opt = document.createElement("option");
      opt.value = val;
      opt.textContent = val;
      select.appendChild(opt);
    }
  });

});

}


// ✅ STEP 3: CLASS CHANGE
document.getElementById("class").addEventListener("change", function(){

  let selected = this.value;
  let sectionSelect = document.getElementById("section");

  sectionSelect.innerHTML = '';

  let filtered = sections.filter(s => s.class === selected);

  if (filtered.length === 0) {
    sectionSelect.innerHTML = '<option>No section</option>';
    return;
  }

  filtered.forEach(s => {
    let opt = document.createElement("option");
    opt.value = s.section;
    opt.textContent = s.section;
    sectionSelect.appendChild(opt);
  });

});


// ✅ STEP 4: SECTION CHANGE
document.getElementById("section").addEventListener("change", function(){

  let classVal = document.getElementById("class").value;
  let sectionVal = this.value;

  let found = sections.find(s =>
    s.class === classVal &&
    s.section === sectionVal
  );

  document.getElementById("adviser").value = found ? found.adviser : "";

});


// ✅ SAVE FUNCTION
function save(){

  let lrn = document.getElementById("lrn").value;

  if (lrn.length !== 12){
    alert("LRN must be 12 digits");
    return;
  }

  if (localStorage.getItem(lrn)){
    alert("Duplicate student!");
    return;
  }

  localStorage.setItem(lrn, "saved");

  document.getElementById("msg").innerText = "Saved!";
}

</script>

</body>
</html>
