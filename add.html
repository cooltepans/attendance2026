<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Student</title>

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg, #007BFF, #00c6ff);
  }

  .container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
  }

  label {
    font-weight: bold;
  }

  input, select {
    width: 100%;
    padding: 8px;
    margin: 8px 0 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #0056b3;
  }

  .msg {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
  }

</style>
</head>

<body>

<div class="container">

<h2>➕ Add Student</h2>

<form id="studentForm">

  <!-- ✅ CLASS -->
  <label>Class</label>
  <select id="class" required>
    <option>Loading...</option>
  </select>

  <!-- ✅ SECTION -->
  <label>Section</label>
  <select id="section" required>
    <option>Select Class First</option>
  </select>

  <!-- ✅ ADVISER AUTO -->
  <label>Adviser</label>
  <input type="text" id="adviser" readonly>

  <!-- ✅ LRN -->
  <label>LRN</label>
  <input type="number" id="lrn" required>

  <!-- ✅ NAME -->
  <label>Student Name</label>
  <input type="text" id="name" required>

  <!-- ✅ GENDER -->
  <label>Gender</label>
  <select id="gender" required>
    <option value="">Select</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <button type="submit">💾 Save Student</button>

</form>

<div class="msg" id="msg"></div>

</div>

<script>
console.log("Script running...");
// ===============================
// ✅ STORAGE
// ===============================
let sections = [];


// ===============================
// ✅ LOAD CLASS LIST
// ===============================
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkaem468jROXCpu4pfmlzfsRY5tpznOAmP-00X1ObYMNxcP6nWGrGUNFjK-OAZwuRlet72oVMWjZB/pub?gid=1776947729&single=true&output=csv")
// 🔴 REPLACE WITH YOUR CLASS SHEET CSV LINK
.then(res => res.text())
.then(data => {

  let rows = data.split("\n").slice(1);
  let classSelect = document.getElementById("class");

  classSelect.innerHTML = '<option value="">Select Class</option>';

  rows.forEach(row => {
    let c = row.replace("\r","").trim();
    if (c !== "") {
      let opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      classSelect.appendChild(opt);
    }
  });

});


// ===============================
// ✅ LOAD SECTION + ADVISER
// ===============================
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkaem468jROXCpu4pfmlzfsRY5tpznOAmP-00X1ObYMNxcP6nWGrGUNFjK-OAZwuRlet72oVMWjZB/pub?gid=1804340378&single=true&output=csv
")
// 🔴 REPLACE WITH YOUR SECTION SHEET LINK
.then(res => res.text())
.then(data => {

  let rows = data.split("\n").slice(1);

  rows.forEach(row => {

    let cols = row.split(",");

    if (cols.length >= 3) {
      sections.push({
        class: cols[0].replace("\r","").trim(),
        section: cols[1].replace("\r","").trim(),
        adviser: cols[2].replace("\r","").trim()
      });
    }

  });

  console.log("✅ Sections Loaded:", sections);

});


// ===============================
// ✅ FILTER SECTION BASED ON CLASS
// ===============================
document.getElementById("class").addEventListener("change", function() {

  let selectedClass = this.value;
  let sectionDropdown = document.getElementById("section");

  sectionDropdown.innerHTML = '<option value="">Select Section</option>';

  sections.forEach(s => {
    if (s.class === selectedClass) {
      let opt = document.createElement("option");
      opt.value = s.section;
      opt.textContent = s.section;
      sectionDropdown.appendChild(opt);
    }
  });

});


// ===============================
// ✅ AUTO SHOW ADVISER
// ===============================
document.getElementById("section").addEventListener("change", function() {

  let selectedClass = document.getElementById("class").value;
  let selectedSection = this.value;

  let found = sections.find(s =>
    s.class === selectedClass &&
    s.section === selectedSection
  );

  document.getElementById("adviser").value = found ? found.adviser : "";

});


// ===============================
// ✅ LIMIT LRN TO 12 DIGITS
// ===============================
document.getElementById("lrn").addEventListener("input", function() {

  if (this.value.length > 12) {
    this.value = this.value.slice(0, 12);
  }

});


// ===============================
// ✅ SAVE TO GOOGLE SHEETS
// ===============================
document.getElementById("studentForm").addEventListener("submit", function(e) {

  e.preventDefault();

  let lrn = document.getElementById("lrn").value;

  if (lrn.length !== 12) {
    alert("❌ LRN must be exactly 12 digits");
    return;
  }

  let student = {
    class: document.getElementById("class").value,
    section: document.getElementById("section").value,
    lrn: lrn,
    name: document.getElementById("name").value,
    gender: document.getElementById("gender").value
  };

  fetch("https://script.google.com/macros/s/AKfycbxf41h2kdkb4DIqW4iCmqtjxr58pllfyZza_9n2zU7I0ndPyUADGa5QD_MKNTUblXg6/exec", {
    method: "POST",
    body: JSON.stringify(student)
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("msg").innerText = "✅ Student saved!";
    document.getElementById("studentForm").reset();
    document.getElementById("adviser").value = "";
  })
  .catch(err => {
    alert("❌ Failed to save");
    console.error(err);
  });

});

</script>

</body>
</html>
