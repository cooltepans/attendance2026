<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Student</title>

<style>

body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: linear-gradient(135deg, #007BFF, #00c6ff);
}

.container {
  max-width: 500px;
  margin: 50px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #007BFF;
  box-shadow: 0 0 5px rgba(0,123,255,0.5);
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(45deg, #007BFF, #00c6ff);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.msg {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
  opacity: 0;
  transition: 0.3s;
}

.msg.show {
  opacity: 1;
}

.error {
  color: red;
}

</style>
</head>

<body>

<div class="container">

<h2>➕ Add Student</h2>

<form id="studentForm">

<label>Class</label>
<select id="class" required>
  <option>Loading...</option>
</select>

<label>Section</label>
<select id="section" required>
  <option>Select Class First</option>
</select>

<label>Adviser</label>
<input type="text" id="adviser" readonly>

<label>LRN</label>
<input type="number" id="lrn" required>

<label>Student Name</label>
<input type="text" id="name" required>

<label>Gender</label>
<select id="gender" required>
  <option value="">Select</option>
  <option>Male</option>
  <option>Female</option>
</select>

<button type="submit" id="saveBtn">💾 Save Student</button>

</form>

<div class="msg" id="msg"></div>

</div>

<script>

// ✅ STORAGE
let sections = [];


// ✅ LOAD CLASS (FIXED LINK ✅)
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkaem468jROXCpu4pfmlzfsRY5tpznOAmP-00X1ObYMNxcP6nWGrGUNFjK-OAZwuRlet72oVMWjZB/pub?gid=1776947729&single=true&output=csv")
.then(res => res.text())
.then(data => {

  let rows = data.split("\n").slice(1);
  let classSelect = document.getElementById("class");

  classSelect.innerHTML = '<option>Select Class</option>';

  rows.forEach(row => {
    let c = row.replace("\r","").trim();
    if (c) {
      classSelect.innerHTML += `<option value="${c}">${c}</option>`;
    }
  });

})
.catch(err => console.error("❌ Class Load Error:", err));


// ✅ LOAD SECTIONS
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkaem468jROXCpu4pfmlzfsRY5tpznOAmP-00X1ObYMNxcP6nWGrGUNFjK-OAZwuRlet72oVMWjZB/pub?gid=1804340378&single=true&output=csv")
.then(res => res.text())
.then(data => {

  let rows = data.split("\n").slice(1);

  sections = [];

  rows.forEach(row => {
    let cols = row.split(",");

    if (cols.length >= 3) {
      sections.push({
        class: cols[0].trim(),
        section: cols[1].trim(),
        adviser: cols[2].trim()
      });
    }
  });

})
.catch(err => console.error("❌ Section Load Error:", err));


// ✅ CLASS CHANGE → FILTER SECTION
document.getElementById("class").addEventListener("change", function() {

  let selectedClass = this.value;
  let sectionDropdown = document.getElementById("section");

  sectionDropdown.innerHTML = '<option>Select Section</option>';

  sections.forEach(s => {
    if (s.class === selectedClass) {
      sectionDropdown.innerHTML += `<option value="${s.section}">${s.section}</option>`;
    }
  });

});


// ✅ SECTION CHANGE → ADVISER
document.getElementById("section").addEventListener("change", function() {

  let selectedClass = document.getElementById("class").value;
  let selectedSection = this.value;

  let found = sections.find(s =>
    s.class === selectedClass &&
    s.section === selectedSection
  );

  document.getElementById("adviser").value = found ? found.adviser : "";

});


// ✅ LIMIT LRN
document.getElementById("lrn").addEventListener("input", function() {
  if (this.value.length > 12) {
    this.value = this.value.slice(0, 12);
  }
});


// ✅ SAVE + DUPLICATE CHECK
document.getElementById("studentForm").addEventListener("submit", function(e) {

  e.preventDefault();

  let btn = document.getElementById("saveBtn");
  let msg = document.getElementById("msg");

  btn.innerText = "Saving...";
  btn.disabled = true;

  let lrn = document.getElementById("lrn").value;

  if (lrn.length !== 12) {
    alert("❌ LRN must be 12 digits");
    btn.innerText = "💾 Save Student";
    btn.disabled = false;
    return;
  }

  // ✅ CHECK DUPLICATE VIA SIMPLE CACHE (IMPORTANT)
  if (localStorage.getItem("lrn_" + lrn)) {
    alert("❌ Student with this LRN already exists!");
    btn.innerText = "💾 Save Student";
    btn.disabled = false;
    return;
  }

  let student = {
    class: class.value,
    section: section.value,
    lrn: lrn,
    name: name.value,
    gender: gender.value
  };

  fetch("https://script.google.com/macros/s/AKfycbxf41h2kdkb4DIqW4iCmqtjxr58pllfyZza_9n2zU7I0ndPyUADGa5QD_MKNTUblXg6/exec", {
    method: "POST",
    body: JSON.stringify(student)
  })
  .then(res => res.text())
  .then(data => {

    // ✅ mark LRN as used
    localStorage.setItem("lrn_" + lrn, true);

    msg.innerText = "✅ Student Saved!";
    msg.classList.add("show");

    document.getElementById("studentForm").reset();
    document.getElementById("section").innerHTML = '<option>Select Class First</option>';
    document.getElementById("adviser").value = "";

    btn.innerText = "💾 Save Student";
    btn.disabled = false;

    setTimeout(() => msg.classList.remove("show"), 3000);

  })
  .catch(err => {
    console.error(err);
    alert("❌ Save failed");
    btn.innerText = "💾 Save Student";
    btn.disabled = false;
  });

});

</script>

</body>
</html>
